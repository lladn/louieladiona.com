baseURL: "https://louieladiona.com/"
languageCode: en-us
title: Louie Ladiona
theme: PaperMod

author:
  name: Louie Ladiona



params:
  env: production
  author: Louie Ladiona
  ShowShareButtons: true
  ShareButtons:
    - linkedin
    - twitter
    - facebook
  ShowAuthor: true
  ShowBreadCrumbs: true
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  hideSummary: false
  hideFooter: false
  profileMode:
    enabled: true
    title: Look at the sky, beautiful isn't it? 
    subtitle: > 
      This is my personal blog. I write about topics that I enjoy, 
      I ussually  Exploring technology, building useful tools, staying active, 
      and documenting what I learn along the way."
    imageUrl: https://avatars.githubusercontent.com/lladn?size=175
    # imageTitle: "Profile Image"
    imageWidth: 200
    imageHeight: 200
  homeInfoParams:
    title: Look at the sky, beautiful isn't it? 
    Content: "This is my personal blog. I write about topics that I enjoy, I ussually  Exploring technology, building useful tools, staying active, and documenting what I learn along the way."
  socialIcons:
    - name: linkedin
      url: "https://linkedin.com/in/ladionalouie"
    - name: github
      url: "https://github.com/lladn"
    - name: instagram
      url: "https://instagram.com/louieladn"
    - name: "rss"
      url: "https://louieladiona.com/index.xml"
    - name: buymeacoffee
      url: "https://buymeacoffee.com/louieladiona"
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0 # Determines approximately where in the text is the pattern expected to be found.
    distance: 100 # A distance of 100 would require a perfect match to be within 20 characters of the location to be found using a threshold of 0.2
    threshold: 0.3 # At what point does the match algorithm give up. A threshold of 0.0 requires a perfect match (of both letters and location), a threshold of 1.0 would match anything.
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]

outputs:
  home:
    - HTML
    - RSS
    - JSON

rssLimit: 1000


menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 10
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 15
    - identifier: tags
      name: Knowledge Base
      url: /knowledge-base/
      weight: 20
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 25
    - identifier: search
      name: Search
      url: /search/
      weight: 30